seed: 67
mode: debug
environment:
  layout_name: coordination_ring
  layout_file: null
  horizon: 400
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: policies/final_agent.py
    class_name: StudentAgent
    name: final_agent
    config:
      ingredient: onion
      avoid_teammate: true
      teammate_aware: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: greedy_full_task
    ingredient: onion
    avoid_teammate: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 1
  episode_seeds:
  - 67
  swap_agent_positions: false
observation:
  type: state
  include_agent_index: true
rendering:
  mode: window
  fps: 10
  window_caption: Overcooked-AI Final Agent
  save_gif: false
  gif_path: outputs/basic_policies.gif
logging:
  output_dir: outputs/basic_policies_run
  save_step_log: true
  save_episode_summary: true
  save_trajectory_pickle: true
