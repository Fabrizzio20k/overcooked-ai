seed: 67
mode: debug
environment:
  layout_name: asymmetric_advantages
  layout_file: null
  horizon: 400
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: policies/final_agent.py
    class_name: StudentAgent
    name: final_agent
    config:
      ingredient: onion
      avoid_teammate: true
      teammate_aware: true
      use_ppo: true
      ppo_model_path: models/ppo_general_agent.zip
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: greedy_full_task
    ingredient: onion
    avoid_teammate: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 1
  episode_seeds:
  - 67
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 12
  window_caption: Overcooked-AI Escenario 1
  save_gif: false
logging:
  output_dir: outputs/play_escenario1
  save_step_log: true
  save_episode_summary: true
  save_trajectory_pickle: false
