seed: 67
mode: debug
environment:
  layout_name: null
  layout_file: configs/layouts/scenario_4.layout
  horizon: 400
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: policies/final_agent.py
    class_name: StudentAgent
    name: final_agent
    config:
      ingredient: onion
      avoid_teammate: true
      teammate_aware: true
      use_ppo: false
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: random
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 1
  episode_seeds:
  - 67
  swap_agent_positions: false
observation:
  type: state
  include_agent_index: true
rendering:
  mode: window
  fps: 5
  save_gif: false
logging:
  output_dir: outputs/play_escenario4
  save_step_log: false
  save_episode_summary: false
  save_trajectory_pickle: false
